<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 標高表示</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>現在地・標高表示</h1>

        <button id="getLocationBtn">
            現在地取得
        </button>

        <div class="info">

            <p>
                <strong>緯度:</strong>
                <span id="lat">-</span>
            </p>

            <p>
                <strong>経度:</strong>
                <span id="lon">-</span>
            </p>

            <p>
                <strong>標高:</strong>
                <span id="elevation">-</span> m
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
